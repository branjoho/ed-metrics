{% extends 'base.html' %}
{% block content %}
{% if month_list %}
<div style="padding: 12px 24px; border-bottom: 1px solid #e2e8f0; background: #fff;">
  <select onchange="window.location='/dashboard?month='+this.value.split('/')[0]+'&year='+this.value.split('/')[1]"
          style="padding:5px 10px;border:1px solid #e2e8f0;border-radius:6px;font-size:13px;">
    {% for m in month_list %}
    <option value="{{ m.month }}/{{ m.year }}" {% if loop.index0 == sel_idx %}selected{% endif %}>
      {{ m.label }}
    </option>
    {% endfor %}
  </select>
</div>
{% endif %}
{% if not has_data %}
<div style="max-width:600px;margin:80px auto;text-align:center;padding:40px;">
  <h2>No data yet</h2>
  <p style="color:#64748b;margin-bottom:24px;">Upload your first ED Provider Metrics PDF to get started.</p>
  <a href="{{ url_for('upload_page') }}" style="display:inline-block;padding:12px 28px;background:#2563eb;color:#fff;border-radius:8px;font-weight:700;text-decoration:none;">Upload PDF</a>
</div>
{% else %}
<p>Dashboard data will appear here.</p>
{% endif %}
{% endblock %}
